<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心里有事</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #ededed;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    color: #1a1a1a;
  }
  /* 顶部栏 */
  .header {
    flex: none;
    background: #f7f7f7;
    border-bottom: 1px solid #e0e0e0;
    padding: 12px 16px 10px;
    text-align: center;
  }
  .header .title { font-size: 17px; font-weight: 600; }
  .header .slogan { font-size: 12px; color: #8a9a8a; margin-top: 2px; letter-spacing: 2px; }
  .header .subtitle { font-size: 11px; color: #999; margin-top: 6px; line-height: 1.5; }
  /* 消息区 */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px 8px;
    -webkit-overflow-scrolling: touch;
  }
  .msg { display: flex; margin-bottom: 16px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    flex: none; width: 36px; height: 36px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin: 0 8px;
  }
  .msg.ai .avatar { background: #d9e8ff; }
  .msg.user .avatar { background: #95ec69; }
  .bubble {
    max-width: 74%;
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 15.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }
  .msg.ai .bubble { background: #fff; border-top-left-radius: 2px; }
  .msg.user .bubble { background: #95ec69; border-top-right-radius: 2px; }
  .bubble.typing::after {
    content: '▋'; animation: blink 1s steps(2) infinite; margin-left: 1px; color: #888;
  }
  @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0;} }
  /* 输入区 */
  .input-bar {
    flex: none;
    background: #f7f7f7;
    border-top: 1px solid #e0e0e0;
    padding: 8px 10px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
  }
  .input-bar textarea {
    flex: 1;
    border: none;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 15.5px;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    font-family: inherit;
    outline: none;
    background: #fff;
  }
  .input-bar button {
    flex: none;
    border: none;
    background: #07c160;
    color: #fff;
    border-radius: 6px;
    padding: 0 16px;
    height: 38px;
    font-size: 15px;
    font-weight: 500;
  }
  .input-bar button:disabled { background: #b2e5c6; }
  /* 开场提示 */
  .welcome {
    text-align: center; color: #b0b0b0; font-size: 12.5px;
    margin: 8px 20px 20px; line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="title">心里有事</div>
    <div class="slogan">请个事假</div>
    <div class="subtitle">这是一个陪你梳理困扰的自助小工具，不是心理咨询或医疗<br>如遇心理危机，请拨打心理援助热线或就医</div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      你可以从任何一件让你困扰、反复出现的事说起。<br>比如："有件事我一直放不下……"
    </div>
  </div>

  <div class="input-bar">
    <textarea id="input" rows="1" placeholder="说说你的困扰……"></textarea>
    <button id="send">发送</button>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  // 对话历史（在本次会话内存里，刷新页面即清空）
  let history = [];
  let isReplying = false;

  // 自动撑高输入框
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBubble(role, text) {
    const msg = document.createElement('div');
    msg.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🙂' : '🌱';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || isReplying) return;

    // 移除欢迎语
    const w = messagesEl.querySelector('.welcome');
    if (w) w.remove();

    isReplying = true;
    sendBtn.disabled = true;

    addBubble('user', text);
    history.push({ role: 'user', content: text });
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // AI 气泡（先空，边收边填）
    const aiBubble = addBubble('assistant', '');
    aiBubble.classList.add('typing');
    let aiText = '';

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        aiBubble.classList.remove('typing');
        aiBubble.textContent = '（出错了：' + (err.error || resp.status) + '）';
        isReplying = false; sendBtn.disabled = false;
        return;
      }

      // 读取 SSE 流
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          const t = line.trim();
          if (!t.startsWith('data:')) continue;
          const data = t.slice(5).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            if (delta) {
              aiText += delta;
              aiBubble.textContent = aiText;
              scrollToBottom();
            }
          } catch (e) { /* 忽略非JSON行 */ }
        }
      }

      aiBubble.classList.remove('typing');
      if (!aiText) aiBubble.textContent = '（没有收到回复，请重试）';
      history.push({ role: 'assistant', content: aiText });
    } catch (e) {
      aiBubble.classList.remove('typing');
      aiBubble.textContent = '（网络出错，请重试）';
    } finally {
      isReplying = false;
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', send);
  // 回车发送（手机上换行用输入法，桌面按回车发送）
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
      e.preventDefault();
      send();
    }
  });
</script>
</body>
</html>
